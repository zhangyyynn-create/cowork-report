name: Manual cowork report draft

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "测试模式：不调用 DeepSeek，只生成测试内容（正式生成保持 false）"
        required: false
        default: "false"
      force:
        description: "强制重新生成：本周已有草稿时才改成 true"
        required: false
        default: "false"
      start:
        description: "可选：手动指定开始日期，YYYY-MM-DD（通常留空）"
        required: false
      end:
        description: "可选：手动指定结束日期，YYYY-MM-DD（通常留空）"
        required: false


concurrency:
  group: weekly-cowork-report
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check duplicate lock
        id: gate
        run: |
          if [ "${{ inputs.force || 'false' }}" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Force mode enabled; duplicate lock check skipped."
          else
            report_date="$(python -c "import datetime as dt; now=dt.datetime.utcnow()+dt.timedelta(hours=8); monday=now.date()-dt.timedelta(days=now.date().weekday()); print((monday-dt.timedelta(days=1)).isoformat())")"
            if [ -n "${{ inputs.end || '' }}" ]; then
              report_date="${{ inputs.end }}"
            fi
            lock_branch="report-lock/${report_date}"
            echo "report_date=${report_date}" >> "$GITHUB_OUTPUT"
            if git ls-remote --exit-code --heads origin "$lock_branch" >/dev/null 2>&1; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Found ${lock_branch}; this run will skip to avoid duplicate review drafts."
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate report draft
        if: steps.gate.outputs.skip != 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          args=()
          if [ "${{ inputs.dry_run || 'false' }}" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ -n "${{ inputs.start || '' }}" ]; then
            args+=(--start "${{ inputs.start }}")
          fi
          if [ -n "${{ inputs.end || '' }}" ]; then
            args+=(--end "${{ inputs.end }}")
          fi
          python scripts/generate_report.py "${args[@]}"

      - name: Check changes
        id: changes
        if: steps.gate.outputs.skip != 'true'
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "report_date=$(cat .generated/report_date.txt)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create review pull request
        if: steps.gate.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT_DATE: ${{ steps.changes.outputs.report_date }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          branch="weekly-report/${REPORT_DATE}-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add index.html reports.json reports/
          git commit -m "Add cowork report ${REPORT_DATE}"
          git push origin "$branch"
          pr_url=$(gh pr create \
            --base main \
            --head "$branch" \
            --title "待确认发布：cowork报告 ${REPORT_DATE}" \
            --body-file .generated/pr_body.md)
          echo "Created PR: ${pr_url}"
          preview_url="https://htmlpreview.github.io/?https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${branch}/reports/${REPORT_DATE}.html"
          python scripts/send_pr_email.py \
            --pr-url "${pr_url}" \
            --report-date "${REPORT_DATE}" \
            --preview-url "${preview_url}" \
            --report-file "reports/${REPORT_DATE}.html"

          lock_branch="report-lock/${REPORT_DATE}"
          git switch --orphan "$lock_branch"
          git rm -rf . >/dev/null 2>&1 || true
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          {
            echo "report_date=${REPORT_DATE}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "pr_url=${pr_url}"
            echo "created_at=$(date -u --iso-8601=seconds)"
          } > report-lock.txt
          git add report-lock.txt
          git commit -m "Lock cowork report ${REPORT_DATE}"
          git push origin "$lock_branch" || true

      - name: No changes
        if: steps.gate.outputs.skip != 'true' && steps.changes.outputs.changed != 'true'
        run: echo "No report changes generated."

      - name: Skipped duplicate run
        if: steps.gate.outputs.skip == 'true'
        run: echo "Skipped because this report date already has a lock."
