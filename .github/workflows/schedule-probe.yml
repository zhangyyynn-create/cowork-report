name: Schedule probe

on:
  workflow_dispatch:
  schedule:
    # Beijing time: every 5 minutes during Monday 15:00-15:55, for schedule diagnostics only.
    - cron: "*/5 7 * * 1"

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger time
        run: |
          echo "event=${{ github.event_name }}"
          echo "utc=$(date -u --iso-8601=seconds)"
          echo "beijing=$(TZ=Asia/Shanghai date --iso-8601=seconds)"
