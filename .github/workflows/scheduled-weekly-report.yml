name: Scheduled weekly cowork report

on:
  workflow_dispatch:
  schedule:
    # Beijing time Monday 09:30/09:35/09:45/10:00 = UTC Monday 01:30/01:35/01:45/02:00.
    # Backup cron entries compensate for GitHub schedule delay/drop risk; the generator has a duplicate lock.
    - cron: "30 1 * * 1"
    - cron: "35 1 * * 1"
    - cron: "45 1 * * 1"
    - cron: "0 2 * * 1"

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch report generator
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run generate-weekly-report.yml \
            --ref main \
            -f dry_run=false \
            -f force=false
