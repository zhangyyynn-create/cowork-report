name: Send cowork report review email

on:
  workflow_dispatch:
    inputs:
      pr_url:
        description: "Pull request URL to review"
        required: true
      report_date:
        description: "Report date, YYYY-MM-DD"
        required: true

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send review email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          python scripts/send_pr_email.py \
            --pr-url "${{ github.event.inputs.pr_url }}" \
            --report-date "${{ github.event.inputs.report_date }}"
